name: vtu_app
description: VTU Mobile Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.7
  lottie: ^3.3.3
  shimmer: ^3.0.0
  
  # Navigation
  go_router: ^17.2.2
  
  # State Management
  provider: ^6.0.5
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Networking
  dio: ^5.3.3
  retrofit: ^4.0.1
  logger: ^2.7.0
  
  # Authentication
  local_auth: ^3.0.1
  biometric_storage: ^5.0.0
  
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.2.0
  google_sign_in: ^6.1.5
  sign_in_with_apple: ^7.0.1
  
  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  url_launcher: ^6.1.14
  image_picker: ^1.0.4
  crypto: ^3.0.3
  uuid: ^4.0.0
  pdf: ^3.10.7
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: 12.0.1
  
  # UI Components
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  flutter_otp_text_field: ^1.1.1
  animations: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  retrofit_generator: ^10.2.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/